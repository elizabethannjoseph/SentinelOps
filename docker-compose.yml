services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sentinelops-network
  glpi:
    image: glpi/glpi
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8080:80"
    networks:
      - sentinelops-network
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - sentinelops-network
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - sentinelops-network
  jenkins:
    image: jenkins/jenkins:lts
    restart: unless-stopped
    ports:
      - "8081:8080"
    networks:
      - sentinelops-network
  sonarqube:
    image: sonarqube:lts-community
    restart: unless-stopped
    ports:
      - "9000:9000"
    networks:
      - sentinelops-network
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
    - "9002:9000"
    - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - sentinelops-network
  nginx:
    image: nginx:latest
    restart: unless-stopped
    ports:
      - "8082:80"
    networks:
      - sentinelops-network
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    restart: unless-stopped
    environment:
      GLPI_URL: ${GLPI_URL}

      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      SQLITE_DB_PATH: ${SQLITE_DB_PATH}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - jenkins
      - sonarqube
    networks:
      - sentinelops-network
    volumes:
      - ./backend/data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
   
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - sentinelops-network
volumes:
  postgres_data:
  minio_data:
  
networks:
  sentinelops-network:  